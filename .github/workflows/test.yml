name: Test our build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          toolchain: stable

      - name: Build with all features
        run: |
          cargo build --all-features

      - name: Test out our build
        run: |
          cargo test

  build-windows:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          toolchain: stable

      - name: Build on Windows (without unix-only with-ssh feature)
        run: cargo build --no-default-features

  build-wasm:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      # The wasm (browser fetch) backend. `--no-default-features` drops the
      # unix-only `with-ssh` feature, which is never part of a wasm build.
      - name: Build for wasm32 (browser fetch backend)
        run: cargo build --target wasm32-unknown-unknown --no-default-features
